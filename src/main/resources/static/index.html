<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MindBridge · 小桥</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, "Microsoft YaHei", sans-serif;
            margin: 0; background: #fafaf9; color: #1f2937; height: 100vh;
            display: flex; flex-direction: column;
        }
        /* ===== 登录/注册卡片 ===== */
        #auth { flex: 1; display: flex; align-items: center; justify-content: center; }
        .card {
            width: 360px; background: #fff; border: 1px solid #eee; border-radius: 14px;
            padding: 32px; box-shadow: 0 8px 30px rgba(0,0,0,.06);
        }
        .brand { text-align: center; font-size: 24px; font-weight: 700; margin-bottom: 4px; }
        .brand small { display:block; font-size: 12px; color:#9ca3af; font-weight: 400; margin-top: 4px; }
        .tabs { display: flex; margin: 22px 0 18px; border-bottom: 1px solid #eee; }
        .tab { flex:1; text-align:center; padding:10px; cursor:pointer; color:#9ca3af; font-size:15px; }
        .tab.active { color:#b45309; border-bottom: 2px solid #f59e0b; font-weight:600; }
        label { display:block; font-size:13px; color:#6b7280; margin:12px 0 6px; }
        input {
            width:100%; padding:11px 12px; border:1px solid #d1d5db; border-radius:9px; font-size:15px;
        }
        input:focus { outline:none; border-color:#f59e0b; }
        input:disabled { background:#f3f4f6; color:#9ca3af; }
        .btn {
            width:100%; margin-top:20px; padding:12px; border:none; border-radius:9px;
            background:#f59e0b; color:#fff; font-size:16px; cursor:pointer; font-weight:600;
        }
        .btn:disabled { background:#d1d5db; cursor:not-allowed; }
        .msg { margin-top:14px; font-size:13px; text-align:center; min-height:18px; }
        .msg.err { color:#dc2626; }
        .msg.ok { color:#16a34a; }

        /* ===== 聊天界面 ===== */
        #chat { flex:1; display:none; flex-direction:column; max-width:760px; width:100%; margin:0 auto; }
        .topbar {
            display:flex; align-items:center; justify-content:space-between;
            padding:14px 18px; border-bottom:1px solid #eee; background:#fff;
        }
        .topbar .who { font-size:14px; }
        .topbar .who b { color:#b45309; }
        .role-tag { font-size:11px; background:#fef3c7; color:#92400e; padding:2px 8px; border-radius:10px; margin-left:6px; }
        .topbar .actions { display:flex; gap:8px; }
        .ghost-btn { font-size:13px; color:#6b7280; background:none; border:1px solid #e5e7eb; border-radius:7px; padding:6px 12px; cursor:pointer; }
        .ghost-btn:hover { border-color:#f59e0b; color:#b45309; }
        #log { flex:1; overflow-y:auto; padding:20px; }
        .bubble { max-width:78%; padding:10px 14px; border-radius:12px; margin:8px 0; line-height:1.6; white-space:pre-wrap; word-break:break-word; }
        .bubble.you { background:#f59e0b; color:#fff; margin-left:auto; border-bottom-right-radius:3px; }
        .bubble.ai  { background:#fff; border:1px solid #eee; margin-right:auto; border-bottom-left-radius:3px; }
        .inputbar { display:flex; gap:10px; padding:14px 18px; border-top:1px solid #eee; background:#fff; }
        .inputbar input { flex:1; }
        .inputbar button { padding:0 22px; border:none; border-radius:9px; background:#f59e0b; color:#fff; font-size:15px; cursor:pointer; }
        .inputbar button:disabled { background:#d1d5db; }

        /* ===== 个人信息弹窗 ===== */
        .modal-mask { position:fixed; inset:0; background:rgba(0,0,0,.4); display:none; align-items:center; justify-content:center; }
        .modal-mask.show { display:flex; }
        .modal-card { background:#fff; border-radius:14px; padding:26px; width:340px; }
        .modal-card h3 { margin:0 0 4px; }
        .modal-actions { display:flex; gap:10px; justify-content:flex-end; margin-top:18px; }
        .btn-sm { padding:9px 20px; border:none; border-radius:8px; background:#f59e0b; color:#fff; cursor:pointer; font-weight:600; }
    </style>
</head>
<body>
    <!-- 登录 / 注册 -->
    <div id="auth">
        <div class="card">
            <div class="brand">🌉 MindBridge<small>校园心理健康 AI 助手 · 小桥</small></div>
            <div class="tabs">
                <div class="tab active" id="tabLogin" onclick="switchTab('login')">登录</div>
                <div class="tab" id="tabRegister" onclick="switchTab('register')">注册</div>
            </div>
            <label>用户名</label>
            <input id="username" autocomplete="username" placeholder="请输入用户名"/>
            <div id="nickField" style="display:none">
                <label>昵称（选填）</label>
                <input id="nickname" maxlength="32" placeholder="别人看到的名字，不填默认用用户名"/>
            </div>
            <label>密码</label>
            <input id="password" type="password" autocomplete="current-password" placeholder="请输入密码"/>
            <button class="btn" id="submitBtn" onclick="submitAuth()">登 录</button>
            <div class="msg" id="authMsg"></div>
        </div>
    </div>

    <!-- 聊天 -->
    <div id="chat">
        <div class="topbar">
            <div class="who">你好，<b id="meName">同学</b><span class="role-tag" id="meRole"></span></div>
            <div class="actions">
                <button class="ghost-btn" onclick="openProfile()">个人信息</button>
                <button class="ghost-btn" onclick="logout()">退出登录</button>
            </div>
        </div>
        <div id="log"></div>
        <div class="inputbar">
            <input id="msgInput" placeholder="想聊点什么？" autocomplete="off"/>
            <button id="sendBtn" onclick="send()">发送</button>
        </div>
    </div>

    <!-- 个人信息弹窗 -->
    <div id="profileModal" class="modal-mask">
        <div class="modal-card">
            <h3>个人信息</h3>
            <label>用户名（不可修改）</label>
            <input id="pfUsername" disabled/>
            <label>昵称</label>
            <input id="pfNickname" maxlength="32" placeholder="请输入昵称"/>
            <div class="modal-actions">
                <button class="ghost-btn" onclick="closeProfile()">取消</button>
                <button class="btn-sm" id="pfSaveBtn" onclick="saveProfile()">保存</button>
            </div>
            <div class="msg" id="pfMsg"></div>
        </div>
    </div>

    <script>
        let mode = 'login';          // login | register
        let currentMe = null;        // 当前登录用户信息
        const KEY = 'mb_cred';       // sessionStorage 中保存的 Basic 凭证(base64)

        function $(id){ return document.getElementById(id); }
        function cred(){ return sessionStorage.getItem(KEY); }
        function authHeader(){ return { 'Authorization': 'Basic ' + cred() }; }

        function switchTab(m){
            mode = m;
            $('tabLogin').classList.toggle('active', m==='login');
            $('tabRegister').classList.toggle('active', m==='register');
            $('submitBtn').textContent = m==='login' ? '登 录' : '注 册';
            $('nickField').style.display = m==='register' ? 'block' : 'none';
            $('password').setAttribute('autocomplete', m==='login' ? 'current-password' : 'new-password');
            $('authMsg').textContent = '';
        }

        function showMsg(text, type){
            const el = $('authMsg');
            el.textContent = text;
            el.className = 'msg ' + (type || '');
        }

        async function submitAuth(){
            const u = $('username').value.trim();
            const p = $('password').value;
            if(!u || !p){ showMsg('请输入用户名和密码', 'err'); return; }
            $('submitBtn').disabled = true;

            try {
                if(mode === 'register'){
                    const nick = $('nickname').value.trim();
                    const r = await fetch('/api/auth/register', {
                        method:'POST', headers:{'Content-Type':'application/json'},
                        body: JSON.stringify({ username:u, password:p, nickname:nick })
                    });
                    if(r.status === 201){
                        switchTab('login');
                        showMsg('✅ 注册成功！已为你填好用户名，请输入密码登录', 'ok');
                        $('username').value = u;
                        $('password').value = '';
                        $('password').focus();
                    } else if(r.status === 409){
                        showMsg('该用户名已被注册，请换一个', 'err');
                    } else if(r.status === 400){
                        showMsg('用户名至少3位、密码至少6位', 'err');
                    } else {
                        showMsg('注册失败('+r.status+')', 'err');
                    }
                } else {
                    const token = btoa(unescape(encodeURIComponent(u + ':' + p)));
                    const r = await fetch('/api/auth/me', { headers:{ 'Authorization':'Basic '+token } });
                    if(r.ok){
                        sessionStorage.setItem(KEY, token);
                        enterChat(await r.json());
                    } else {
                        showMsg('用户名或密码错误', 'err');
                    }
                }
            } catch(e){
                showMsg('网络错误：' + e.message, 'err');
            } finally {
                $('submitBtn').disabled = false;
            }
        }

        function enterChat(me){
            currentMe = me;
            $('auth').style.display = 'none';
            $('chat').style.display = 'flex';
            $('meName').textContent = me.nickname || me.username;
            const isAdmin = (me.roles || []).includes('ROLE_ADMIN');
            $('meRole').textContent = isAdmin ? '管理员' : '学生';
            $('msgInput').focus();
        }

        function logout(){
            sessionStorage.removeItem(KEY);
            currentMe = null;
            $('log').innerHTML = '';
            $('chat').style.display = 'none';
            $('auth').style.display = 'flex';
            $('password').value = '';
        }

        /* ===== 个人信息 ===== */
        function openProfile(){
            $('pfUsername').value = currentMe.username;
            $('pfNickname').value = currentMe.nickname || '';
            $('pfMsg').textContent = '';
            $('profileModal').classList.add('show');
            $('pfNickname').focus();
        }
        function closeProfile(){ $('profileModal').classList.remove('show'); }

        async function saveProfile(){
            const nick = $('pfNickname').value.trim();
            if(!nick){ $('pfMsg').textContent='昵称不能为空'; $('pfMsg').className='msg err'; return; }
            $('pfSaveBtn').disabled = true;
            try {
                const r = await fetch('/api/auth/profile', {
                    method:'PUT',
                    headers: Object.assign({'Content-Type':'application/json'}, authHeader()),
                    body: JSON.stringify({ nickname: nick })
                });
                if(r.ok){
                    const data = await r.json();
                    currentMe.nickname = data.nickname;
                    $('meName').textContent = data.nickname;
                    $('pfMsg').textContent = '✅ 已保存'; $('pfMsg').className = 'msg ok';
                    setTimeout(closeProfile, 700);
                } else if(r.status === 401){
                    logout();
                } else {
                    $('pfMsg').textContent = '保存失败('+r.status+')'; $('pfMsg').className='msg err';
                }
            } catch(e){
                $('pfMsg').textContent = '网络错误：'+e.message; $('pfMsg').className='msg err';
            } finally {
                $('pfSaveBtn').disabled = false;
            }
        }

        /* ===== 聊天 ===== */
        function addBubble(text, cls){
            const div = document.createElement('div');
            div.className = 'bubble ' + cls;
            div.textContent = text;
            $('log').appendChild(div);
            $('log').scrollTop = $('log').scrollHeight;
            return div;
        }

        async function send(){
            const text = $('msgInput').value.trim();
            if(!text) return;
            $('msgInput').value = '';
            $('sendBtn').disabled = true;
            addBubble(text, 'you');
            const aiBubble = addBubble('', 'ai');

            try {
                const resp = await fetch('/api/chat/stream?message=' + encodeURIComponent(text), {
                    headers: authHeader()
                });
                if(resp.status === 401){ logout(); return; }
                if(!resp.ok){ aiBubble.textContent = '出错了（'+resp.status+'）'; return; }

                const reader = resp.body.getReader();
                const decoder = new TextDecoder();
                let buffer = '';
                while(true){
                    const { done, value } = await reader.read();
                    if(done) break;
                    buffer += decoder.decode(value, { stream:true });
                    const events = buffer.split('\n\n');
                    buffer = events.pop();
                    for(const ev of events){
                        const data = ev.split('\n')
                            .filter(l => l.startsWith('data:'))
                            .map(l => l.slice(5))
                            .join('\n');
                        if(data){
                            aiBubble.textContent += data;
                            $('log').scrollTop = $('log').scrollHeight;
                        }
                    }
                }
            } catch(e){
                aiBubble.textContent += '\n[连接中断: ' + e.message + ']';
            } finally {
                $('sendBtn').disabled = false;
                $('msgInput').focus();
            }
        }

        $('password').addEventListener('keydown', e => { if(e.key==='Enter') submitAuth(); });
        $('msgInput').addEventListener('keydown', e => { if(e.key==='Enter') send(); });
        $('pfNickname').addEventListener('keydown', e => { if(e.key==='Enter') saveProfile(); });

        // 启动时：若已有凭证，尝试自动进入聊天
        (async function init(){
            if(cred()){
                try {
                    const r = await fetch('/api/auth/me', { headers: authHeader() });
                    if(r.ok){ enterChat(await r.json()); return; }
                } catch(e){}
                sessionStorage.removeItem(KEY);
            }
        })();
    </script>
</body>
</html>
