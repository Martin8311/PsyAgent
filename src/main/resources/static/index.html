<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MindBridge · 小桥</title>
    <style>
        body { font-family: system-ui, sans-serif; max-width: 720px; margin: 40px auto; padding: 0 16px; color: #1f2937; }
        h1 { font-size: 22px; }
        #log { border: 1px solid #e5e7eb; border-radius: 8px; padding: 16px; min-height: 240px; white-space: pre-wrap; line-height: 1.6; }
        .row { display: flex; gap: 8px; margin-top: 12px; }
        input { flex: 1; padding: 10px; border: 1px solid #d1d5db; border-radius: 8px; font-size: 15px; }
        button { padding: 10px 18px; border: none; border-radius: 8px; background: #f59e0b; color: #fff; font-size: 15px; cursor: pointer; }
        button:disabled { background: #d1d5db; }
        .you { color: #2563eb; }
        .ai { color: #b45309; }
    </style>
</head>
<body>
    <h1>🌉 MindBridge · 小桥</h1>
    <p>校园心理健康 AI 助手（Phase 1 联通测试页）</p>
    <div id="log"></div>
    <div class="row">
        <input id="msg" placeholder="想聊点什么？" autocomplete="off"/>
        <button id="send">发送</button>
    </div>

    <script>
        const log = document.getElementById('log');
        const input = document.getElementById('msg');
        const btn = document.getElementById('send');

        function append(text, cls) {
            const span = document.createElement('span');
            if (cls) span.className = cls;
            span.textContent = text;
            log.appendChild(span);
            log.scrollTop = log.scrollHeight;
        }

        function send() {
            const message = input.value.trim();
            if (!message) return;
            input.value = '';
            btn.disabled = true;
            append('\n你：' + message + '\n', 'you');
            append('小桥：', 'ai');

            const es = new EventSource('/api/chat/stream?message=' + encodeURIComponent(message));
            es.onmessage = (e) => append(e.data, 'ai');
            es.onerror = () => { es.close(); btn.disabled = false; append('\n'); };
        }

        btn.addEventListener('click', send);
        input.addEventListener('keydown', (e) => { if (e.key === 'Enter') send(); });
    </script>
</body>
</html>
