<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MindBridge · 小桥</title>
    <style>
        :root{
            --primary:#6366f1; --primary-2:#8b5cf6; --accent:#f472b6;
            --ink:#1e1b3a; --muted:#6b7280; --line:rgba(99,102,241,.14);
            --glass:rgba(255,255,255,.72); --glass-strong:rgba(255,255,255,.86);
        }
        *{ box-sizing:border-box; }
        html,body{ height:100%; margin:0; }
        body{
            font-family:"Segoe UI","Microsoft YaHei",system-ui,-apple-system,sans-serif;
            color:var(--ink); background:#f6f5ff; position:relative; overflow:hidden;
        }
        body::before{
            content:""; position:fixed; inset:-20% -10% auto -10%; height:120%; z-index:0;
            background:
                radial-gradient(40% 50% at 18% 22%, rgba(139,92,246,.28), transparent 60%),
                radial-gradient(38% 48% at 82% 18%, rgba(96,165,250,.26), transparent 60%),
                radial-gradient(45% 55% at 75% 82%, rgba(244,114,182,.20), transparent 60%);
            filter:blur(8px); pointer-events:none;
        }
        svg{ width:1em; height:1em; display:block; }
        .ic{ display:inline-flex; }

        /* ===== 登录/注册 ===== */
        #auth{ position:relative; z-index:1; height:100vh; display:flex; align-items:center; justify-content:center; padding:24px; }
        .card{
            width:380px; background:var(--glass); backdrop-filter:blur(22px); -webkit-backdrop-filter:blur(22px);
            border:1px solid rgba(255,255,255,.6); border-radius:24px;
            padding:38px 34px; box-shadow:0 20px 60px -20px rgba(80,70,180,.35);
            animation:rise .5s cubic-bezier(.2,.7,.2,1) both;
        }
        @keyframes rise{ from{ opacity:0; transform:translateY(16px) scale(.98);} to{ opacity:1; transform:none;} }
        .logo{ width:60px; height:60px; margin:0 auto 14px; border-radius:18px;
            background:linear-gradient(135deg,var(--primary),var(--primary-2)); color:#fff;
            display:flex; align-items:center; justify-content:center; font-size:30px;
            box-shadow:0 10px 24px -6px rgba(99,102,241,.6); }
        .brand{ text-align:center; font-size:24px; font-weight:600;
            background:linear-gradient(135deg,var(--primary),var(--primary-2)); -webkit-background-clip:text; background-clip:text; color:transparent; }
        .brand-sub{ text-align:center; font-size:13px; color:var(--muted); margin-top:6px; }
        .auth-tabs{ display:flex; gap:6px; margin:24px 0 18px; background:rgba(99,102,241,.07); padding:5px; border-radius:13px; }
        .auth-tab{ flex:1; text-align:center; padding:9px; cursor:pointer; color:var(--muted); font-size:14px; font-weight:500; border-radius:9px; transition:.2s; }
        .auth-tab.active{ background:#fff; color:var(--primary); box-shadow:0 2px 8px rgba(80,70,180,.12); }
        .field{ position:relative; margin-top:14px; }
        .field > .ic{ position:absolute; left:15px; top:50%; transform:translateY(-50%); color:#a5a3c4; font-size:18px; }
        input{
            width:100%; padding:13px 14px 13px 44px; border:1px solid var(--line); border-radius:13px;
            font-size:15px; font-family:inherit; color:var(--ink); background:rgba(255,255,255,.7); transition:.18s;
        }
        input::placeholder{ color:#b3b1cc; }
        input:focus{ outline:none; border-color:var(--primary); background:#fff; box-shadow:0 0 0 4px rgba(99,102,241,.13); }
        input:disabled{ background:rgba(99,102,241,.05); color:var(--muted); }
        .btn{
            width:100%; margin-top:22px; padding:14px; border:none; border-radius:13px; cursor:pointer;
            background:linear-gradient(135deg,var(--primary),var(--primary-2)); color:#fff; font-size:16px; font-weight:600;
            font-family:inherit; box-shadow:0 10px 24px -8px rgba(99,102,241,.7); transition:.18s;
        }
        .btn:hover{ transform:translateY(-1px); } .btn:active{ transform:translateY(0); }
        .btn:disabled{ background:#c7c5e0; box-shadow:none; cursor:not-allowed; transform:none; }
        .msg{ margin-top:14px; font-size:13px; text-align:center; min-height:18px; }
        .msg.err{ color:#e0496a; } .msg.ok{ color:#0f9d76; }

        /* ===== 主应用壳 ===== */
        #app{ position:relative; z-index:1; display:none; height:100vh; }

        /* ===== 侧栏 ===== */
        .sidebar{
            position:fixed; left:0; top:0; bottom:0; width:248px;
            background:var(--glass-strong); backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px);
            border-right:1px solid rgba(255,255,255,.6);
            box-shadow:4px 0 24px -8px rgba(80,70,180,.18);
            display:flex; flex-direction:column; z-index:2;
        }
        .sb-brand{ display:flex; align-items:center; gap:9px; padding:16px 14px 10px; border-bottom:1px solid var(--line); }
        .sb-logo{ width:32px; height:32px; border-radius:9px; background:linear-gradient(135deg,var(--primary),var(--primary-2));
            color:#fff; display:flex; align-items:center; justify-content:center; font-size:16px; flex-shrink:0; }
        .sb-brand-name{ font-size:15px; font-weight:600; }
        .sb-brand-name small{ display:block; font-size:11px; color:var(--muted); font-weight:400; }
        .sb-search-wrap{ padding:10px 12px 6px; }
        .sb-search{ width:100%; padding:7px 10px 7px 32px; border:1px solid var(--line); border-radius:9px;
            font-size:13px; background:rgba(255,255,255,.7); color:var(--ink); font-family:inherit; }
        .sb-search:focus{ outline:none; border-color:var(--primary); background:#fff; }
        .sb-search-icon{ position:absolute; left:20px; top:50%; transform:translateY(-50%); color:#a5a3c4; font-size:15px; pointer-events:none; }
        .sb-search-row{ position:relative; }
        .sb-new{ display:flex; align-items:center; justify-content:center; gap:7px; margin:6px 12px 8px;
            padding:8px; background:linear-gradient(135deg,var(--primary),var(--primary-2)); color:#fff;
            border-radius:10px; cursor:pointer; font-size:13px; font-weight:600; border:none; font-family:inherit;
            box-shadow:0 6px 16px -6px rgba(99,102,241,.6); transition:.18s; }
        .sb-new:hover{ transform:translateY(-1px); box-shadow:0 8px 20px -6px rgba(99,102,241,.7); }
        .sb-list{ flex:1; overflow-y:auto; padding:4px 0 12px; }
        .sb-list::-webkit-scrollbar{ width:4px; }
        .sb-list::-webkit-scrollbar-thumb{ background:rgba(99,102,241,.2); border-radius:2px; }
        .sb-group-label{ padding:8px 14px 3px; font-size:10px; font-weight:700; color:#9ca3af; letter-spacing:.6px; text-transform:uppercase; }
        .sb-item{ display:flex; align-items:flex-start; gap:0; padding:8px 12px; cursor:pointer;
            border-left:3px solid transparent; transition:.15s; }
        .sb-item:hover{ background:rgba(99,102,241,.06); }
        .sb-item.active{ background:rgba(99,102,241,.1); border-color:var(--primary); }
        .sb-item-body{ flex:1; min-width:0; }
        .sb-title{ font-size:13px; font-weight:500; color:var(--ink); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
        .sb-meta{ font-size:11px; color:#9ca3af; margin-top:2px; display:flex; align-items:center; justify-content:space-between; }
        .sb-del{ opacity:0; cursor:pointer; color:#c11d45; font-size:14px; line-height:1; padding:0 2px; flex-shrink:0; }
        .sb-item:hover .sb-del{ opacity:1; }
        .sb-empty{ text-align:center; padding:32px 16px; color:var(--muted); font-size:13px; }
        .sb-foot{ padding:12px 14px; border-top:1px solid var(--line); display:flex; align-items:center; gap:8px; }
        .sb-user{ flex:1; min-width:0; }
        .sb-user-name{ font-size:13px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
        .sb-user-role{ font-size:11px; color:var(--muted); }
        .icon-btn{ width:34px; height:34px; border:1px solid var(--line); background:rgba(255,255,255,.6); border-radius:9px;
            color:var(--muted); cursor:pointer; font-size:17px; display:flex; align-items:center; justify-content:center; transition:.18s; flex-shrink:0; }
        .icon-btn:hover{ color:var(--primary); border-color:var(--primary); }

        /* ===== 聊天主区 ===== */
        #chat-panel{
            position:fixed; left:248px; right:0; top:0; bottom:0;
            display:flex; flex-direction:column; padding:14px 14px 14px 14px;
            gap:12px;
        }
        .topbar{
            display:flex; align-items:center; justify-content:space-between; padding:12px 18px;
            background:var(--glass-strong); backdrop-filter:blur(18px); -webkit-backdrop-filter:blur(18px);
            border:1px solid rgba(255,255,255,.6); border-radius:18px; box-shadow:0 6px 20px -10px rgba(80,70,180,.25);
        }
        .topbar-left{ display:flex; align-items:center; gap:10px; }
        .topbar-title{ font-size:15px; font-weight:600; max-width:400px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
        .topbar-meta{ font-size:12px; color:var(--muted); }
        .topbar-actions{ display:flex; gap:8px; }
        #log{ flex:1; overflow-y:auto; padding:4px 6px; display:flex; flex-direction:column; gap:12px; }
        #log::-webkit-scrollbar{ width:7px; } #log::-webkit-scrollbar-thumb{ background:rgba(99,102,241,.22); border-radius:4px; }
        .date-sep{ text-align:center; font-size:11px; color:var(--muted); position:relative; margin:4px 0; flex-shrink:0; }
        .date-sep::before{ content:''; position:absolute; left:0; right:0; top:50%; height:1px; background:var(--line); }
        .date-sep span{ background:#f6f5ff; position:relative; padding:0 10px; }
        .row{ display:flex; gap:10px; align-items:flex-end; animation:pop .25s ease both; }
        @keyframes pop{ from{ opacity:0; transform:translateY(8px);} to{ opacity:1; transform:none;} }
        .row.me{ flex-direction:row-reverse; }
        .mini{ width:30px; height:30px; border-radius:9px; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:16px; color:#fff; }
        .mini.ai{ background:linear-gradient(135deg,var(--primary),var(--primary-2)); }
        .mini.me{ background:linear-gradient(135deg,#fb923c,var(--accent)); }
        .bubble{ max-width:72%; padding:12px 16px; border-radius:16px; font-size:15px; line-height:1.65; white-space:pre-wrap; word-break:break-word; }
        .bubble.ai{ background:var(--glass-strong); backdrop-filter:blur(10px); border:1px solid rgba(255,255,255,.6); border-bottom-left-radius:5px; box-shadow:0 4px 16px -8px rgba(80,70,180,.2); }
        .bubble.me{ background:linear-gradient(135deg,var(--primary),var(--primary-2)); color:#fff; border-bottom-right-radius:5px; box-shadow:0 8px 20px -8px rgba(99,102,241,.5); }
        /* Markdown 渲染样式(AI 气泡) */
        .bubble.md{ white-space:normal; }
        .bubble.md>*:first-child{ margin-top:0; }
        .bubble.md>*:last-child{ margin-bottom:0; }
        .bubble.md p{ margin:0 0 8px; }
        .bubble.md h1,.bubble.md h2,.bubble.md h3,.bubble.md h4{ margin:12px 0 6px; font-weight:700; line-height:1.3; }
        .bubble.md h1{ font-size:18px; } .bubble.md h2{ font-size:17px; } .bubble.md h3{ font-size:16px; } .bubble.md h4{ font-size:15px; }
        .bubble.md ul,.bubble.md ol{ margin:4px 0 8px; padding-left:22px; }
        .bubble.md li{ margin:3px 0; }
        .bubble.md code{ background:rgba(99,102,241,.1); padding:1px 5px; border-radius:5px; font-family:'Consolas','Monaco',monospace; font-size:13px; }
        .bubble.md pre{ background:rgba(30,27,75,.06); border:1px solid rgba(99,102,241,.15); border-radius:10px; padding:10px 12px; overflow-x:auto; margin:6px 0; }
        .bubble.md pre code{ background:none; padding:0; font-size:13px; line-height:1.5; display:block; }
        .bubble.md blockquote{ border-left:3px solid var(--primary); margin:6px 0; padding:2px 0 2px 12px; color:#555; }
        .bubble.md a{ color:var(--primary); text-decoration:underline; }
        .bubble.md strong{ font-weight:700; } .bubble.md em{ font-style:italic; }
        .bubble.md hr{ border:none; border-top:1px solid rgba(99,102,241,.2); margin:8px 0; }
        .fb-bar{ margin:1px 0 10px 50px; display:flex; align-items:center; gap:8px; }
        .fb-q{ font-size:12px; color:var(--muted); }
        .fb-btn{ background:rgba(255,255,255,.6); border:1px solid rgba(99,102,241,.16); border-radius:8px; cursor:pointer; font-size:14px; padding:2px 9px; line-height:1.5; }
        .fb-btn:hover{ background:rgba(99,102,241,.12); }
        .fb-done{ font-size:12px; color:#0f7a52; }
        .welcome{ text-align:center; margin:auto; color:var(--muted); font-size:14px; line-height:1.8; }
        .welcome .ic{ font-size:40px; color:#c7c5e0; display:block; width:40px; margin:0 auto 12px; }
        .inputbar{ display:flex; gap:10px; padding:12px;
            background:var(--glass-strong); backdrop-filter:blur(18px); -webkit-backdrop-filter:blur(18px);
            border:1px solid rgba(255,255,255,.6); border-radius:18px; box-shadow:0 6px 20px -10px rgba(80,70,180,.25); }
        .inputbar input{ flex:1; padding-left:18px; border-radius:13px; }
        .send-btn{ width:46px; height:46px; flex-shrink:0; border:none; border-radius:13px; cursor:pointer; font-size:20px;
            background:linear-gradient(135deg,var(--primary),var(--primary-2)); color:#fff; display:flex; align-items:center; justify-content:center;
            box-shadow:0 8px 20px -8px rgba(99,102,241,.7); transition:.18s; }
        .send-btn:hover{ transform:translateY(-1px); } .send-btn:disabled{ background:#c7c5e0; box-shadow:none; cursor:not-allowed; }

        /* ===== 个人信息弹窗 ===== */
        .modal-mask{ position:fixed; inset:0; z-index:20; background:rgba(40,33,90,.32); backdrop-filter:blur(4px);
            display:none; align-items:center; justify-content:center; padding:20px; }
        .modal-mask.show{ display:flex; }
        .modal-card{ width:360px; background:var(--glass-strong); backdrop-filter:blur(24px);
            border:1px solid rgba(255,255,255,.6); border-radius:22px; padding:28px; box-shadow:0 30px 70px -20px rgba(80,70,180,.5); }
        .modal-card h3{ margin:0 0 4px; font-size:18px; font-weight:600; display:flex; align-items:center; gap:8px; }
        .modal-card h3 .ic{ color:var(--primary); font-size:20px; }
        .modal-card .tip{ font-size:13px; color:var(--muted); margin:0 0 16px; }
        .modal-actions{ display:flex; gap:10px; justify-content:flex-end; margin-top:20px; }
        .btn-ghost{ padding:10px 18px; border:1px solid var(--line); background:rgba(255,255,255,.6); border-radius:11px; color:var(--muted); cursor:pointer; font-family:inherit; font-size:14px; }
        .btn-ghost:hover{ border-color:var(--primary); color:var(--primary); }
        .btn-sm{ padding:10px 22px; border:none; border-radius:11px; cursor:pointer; font-family:inherit; font-size:14px; font-weight:600;
            background:linear-gradient(135deg,var(--primary),var(--primary-2)); color:#fff; }
    </style>
</head>
<body>

<!-- ===== 登录/注册 ===== -->
<div id="auth">
    <div class="card">
        <div class="logo"><span class="ic" data-i="heart"></span></div>
        <div class="brand">MindBridge</div>
        <div class="brand-sub">校园心理健康 AI 助手 · 小桥陪你聊聊</div>
        <div class="auth-tabs">
            <div class="auth-tab active" id="tabLogin" onclick="switchTab('login')">登录</div>
            <div class="auth-tab" id="tabRegister" onclick="switchTab('register')">注册</div>
        </div>
        <div class="field"><span class="ic" data-i="user"></span>
            <input id="username" autocomplete="username" placeholder="用户名"/></div>
        <div class="field" id="nickField" style="display:none"><span class="ic" data-i="smile"></span>
            <input id="nickname" maxlength="32" placeholder="昵称（选填）"/></div>
        <div class="field"><span class="ic" data-i="lock"></span>
            <input id="password" type="password" autocomplete="current-password" placeholder="密码"/></div>
        <button class="btn" id="submitBtn" onclick="submitAuth()">登 录</button>
        <div class="msg" id="authMsg"></div>
    </div>
</div>

<!-- ===== 主应用壳 ===== -->
<div id="app">

    <!-- 侧栏 -->
    <div class="sidebar">
        <div class="sb-brand">
            <div class="sb-logo"><span class="ic" data-i="heart"></span></div>
            <div class="sb-brand-name">小桥<small>MindBridge</small></div>
        </div>
        <div class="sb-search-wrap">
            <div class="sb-search-row">
                <span class="ic sb-search-icon" data-i="search"></span>
                <input class="sb-search" id="searchInput" placeholder="搜索对话…" oninput="handleSearch(this.value)">
            </div>
        </div>
        <button class="sb-new" onclick="newSession()">
            <span class="ic" data-i="plus"></span>新建对话
        </button>
        <div class="sb-list" id="sessionList"></div>
        <div class="sb-foot">
            <div class="sb-logo" style="width:28px;height:28px;font-size:14px;border-radius:8px;flex-shrink:0"><span class="ic" data-i="user"></span></div>
            <div class="sb-user">
                <div class="sb-user-name" id="sbUserName">—</div>
                <div class="sb-user-role" id="sbUserRole"></div>
            </div>
            <button class="icon-btn" id="adminEntryBtn" style="display:none" onclick="location.href='/admin.html'" title="管理后台"><span class="ic" data-i="shield"></span></button>
            <button class="icon-btn" onclick="openProfile()" title="个人信息"><span class="ic" data-i="settings"></span></button>
            <button class="icon-btn" onclick="logout()" title="退出"><span class="ic" data-i="logout"></span></button>
        </div>
    </div>

    <!-- 聊天主区 -->
    <div id="chat-panel">
        <div class="topbar">
            <div class="topbar-left">
                <div class="avatar" style="width:34px;height:34px;border-radius:10px;background:linear-gradient(135deg,var(--primary),var(--primary-2));color:#fff;display:flex;align-items:center;justify-content:center;font-size:17px;box-shadow:0 4px 12px -4px rgba(99,102,241,.6)"><span class="ic" data-i="bot"></span></div>
                <div>
                    <div class="topbar-title" id="chatTitle">选择或新建对话</div>
                    <div class="topbar-meta" id="chatMeta"></div>
                </div>
            </div>
        </div>
        <div id="log"></div>
        <div class="inputbar">
            <input id="msgInput" placeholder="想聊点什么？小桥在认真听～" autocomplete="off"/>
            <button class="send-btn" id="sendBtn" onclick="send()"><span class="ic" data-i="send"></span></button>
        </div>
    </div>
</div>

<!-- 个人信息弹窗 -->
<div id="profileModal" class="modal-mask">
    <div class="modal-card">
        <h3><span class="ic" data-i="settings"></span>个人信息</h3>
        <p class="tip">修改你的昵称，小桥会用它称呼你</p>
        <div class="field"><span class="ic" data-i="id"></span><input id="pfUsername" disabled/></div>
        <div class="field"><span class="ic" data-i="smile"></span><input id="pfNickname" maxlength="32" placeholder="请输入昵称"/></div>
        <div class="modal-actions">
            <button class="btn-ghost" onclick="closeProfile()">取消</button>
            <button class="btn-sm" id="pfSaveBtn" onclick="saveProfile()">保存</button>
        </div>
        <div class="msg" id="pfMsg"></div>
    </div>
</div>

<script>
const ICONS = {
    heart:'<path d="M12 21c-4.5-3-8-6.5-8-10.5A4.2 4.2 0 0 1 12 8a4.2 4.2 0 0 1 8 2.5C20 14.5 16.5 18 12 21z"/>',
    user:'<path d="M6 21v-1a4 4 0 0 1 4-4h4a4 4 0 0 1 4 4v1"/><circle cx="12" cy="8" r="4"/>',
    smile:'<circle cx="12" cy="12" r="9"/><path d="M9 10h.01M15 10h.01M9 14.5a4 4 0 0 0 6 0"/>',
    lock:'<rect x="5" y="11" width="14" height="9" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/>',
    bot:'<rect x="4" y="8" width="16" height="12" rx="3"/><path d="M12 8V4M8 4h8"/><circle cx="9.5" cy="14" r="1.1"/><circle cx="14.5" cy="14" r="1.1"/>',
    settings:'<circle cx="12" cy="12" r="3"/><path d="M12 3v2.5M12 18.5V21M3 12h2.5M18.5 12H21M5.6 5.6l1.8 1.8M16.6 16.6l1.8 1.8M18.4 5.6l-1.8 1.8M7.4 16.6l-1.8 1.8"/>',
    logout:'<path d="M14 8V6a2 2 0 0 0-2-2H6a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h6a2 2 0 0 0 2-2v-2"/><path d="M10 12h11M18 9l3 3-3 3"/>',
    send:'<path d="M22 2 11 13"/><path d="M22 2 15 22l-4-9-9-4 20-7z"/>',
    id:'<rect x="3" y="5" width="18" height="14" rx="2"/><circle cx="8.5" cy="11" r="2"/><path d="M5 16c.5-1.3 1.9-2 3.5-2s3 .7 3.5 2M14 10h4M14 14h4"/>',
    shield:'<path d="M12 3l8 3v6c0 4.5-3.2 7.8-8 9-4.8-1.2-8-4.5-8-9V6z"/>',
    search:'<circle cx="11" cy="11" r="7"/><path d="m21 21-4.35-4.35"/>',
    plus:'<path d="M12 5v14M5 12h14"/>',
    trash:'<path d="M4 7h16M10 11v6M14 11v6M6 7l1 13a2 2 0 0 0 2 2h6a2 2 0 0 0 2-2l1-13M9 7V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v3"/>'
};
function svgFor(n){ return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">'+(ICONS[n]||'')+'</svg>'; }
function paintIcons(root){ (root||document).querySelectorAll('.ic[data-i]').forEach(el=>{ if(!el.dataset.done){ el.innerHTML=svgFor(el.dataset.i); el.dataset.done='1'; } }); }
function esc(s){ const d=document.createElement('div'); d.textContent=s==null?'':s; return d.innerHTML; }

// ===== 轻量 Markdown 渲染（无外部依赖，先转义再解析，防 XSS）=====
function mdEscape(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function mdInline(s){
    return s
        .replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>')
        .replace(/__([^_]+)__/g,'<strong>$1</strong>')
        .replace(/\*([^*\n]+)\*/g,'<em>$1</em>')
        .replace(/\[([^\]]+)\]\(([^)\s]+)\)/g,(m,t,u)=>{
            const safe=/^(https?:|mailto:)/i.test(u)?u:'#';
            return '<a href="'+safe+'" target="_blank" rel="noopener">'+t+'</a>';
        });
}
function renderMarkdown(src){
    if(src==null) return '';
    const blocks=[];
    // 抽出围栏代码块(占位，避免内部内容被当 markdown 解析)
    let text=src.replace(/```[a-zA-Z0-9]*\n?([\s\S]*?)```/g,(m,code)=>{
        blocks.push(code.replace(/\n$/,'')); return '␀CB'+(blocks.length-1)+'␀';
    });
    text=mdEscape(text);
    const inlineCodes=[];
    text=text.replace(/`([^`\n]+)`/g,(m,c)=>{ inlineCodes.push(c); return '␀IC'+(inlineCodes.length-1)+'␀'; });
    const lines=text.split('\n');
    let html='', list=null;
    const closeList=()=>{ if(list){ html+='</'+list+'>'; list=null; } };
    for(let line of lines){
        let m;
        if(m=line.match(/^(#{1,4})\s+(.*)$/)){ closeList(); const n=m[1].length; html+='<h'+n+'>'+mdInline(m[2])+'</h'+n+'>'; continue; }
        if(/^\s*([-*_])\1\1+\s*$/.test(line)){ closeList(); html+='<hr>'; continue; }
        if(m=line.match(/^>\s?(.*)$/)){ closeList(); html+='<blockquote>'+mdInline(m[1])+'</blockquote>'; continue; }
        if(m=line.match(/^\s*\d+\.\s+(.*)$/)){ if(list!=='ol'){ closeList(); html+='<ol>'; list='ol'; } html+='<li>'+mdInline(m[1])+'</li>'; continue; }
        if(m=line.match(/^\s*[-*]\s+(.*)$/)){ if(list!=='ul'){ closeList(); html+='<ul>'; list='ul'; } html+='<li>'+mdInline(m[1])+'</li>'; continue; }
        if(/^\s*$/.test(line)){ closeList(); continue; }
        closeList(); html+='<p>'+mdInline(line)+'</p>';
    }
    closeList();
    html=html.replace(/␀IC(\d+)␀/g,(m,n)=>'<code>'+mdEscape(inlineCodes[+n])+'</code>');
    html=html.replace(/␀CB(\d+)␀/g,(m,n)=>'<pre><code>'+mdEscape(blocks[+n])+'</code></pre>');
    return html;
}

paintIcons();

// ===== 状态 =====
let mode = 'login';
let currentMe = null;
let currentSessionId = null;
let allSessions = [];
let searchTimer = null;
const KEY = 'mb_cred';
function $(id){ return document.getElementById(id); }
function cred(){ return sessionStorage.getItem(KEY); }
function authHeader(){ return { 'Authorization':'Basic '+cred() }; }
function jsonHeader(){ return Object.assign({'Content-Type':'application/json'}, authHeader()); }

// ===== 登录/注册 =====
function switchTab(m){
    mode = m;
    $('tabLogin').classList.toggle('active', m==='login');
    $('tabRegister').classList.toggle('active', m==='register');
    $('submitBtn').textContent = m==='login' ? '登 录' : '注 册';
    $('nickField').style.display = m==='register' ? 'block' : 'none';
    $('authMsg').textContent = '';
}
function showMsg(text, type){ const el=$('authMsg'); el.textContent=text; el.className='msg '+(type||''); }

async function submitAuth(){
    const u=$('username').value.trim(), p=$('password').value;
    if(!u||!p){ showMsg('请输入用户名和密码','err'); return; }
    $('submitBtn').disabled=true;
    try{
        if(mode==='register'){
            const nick=$('nickname').value.trim();
            const r=await fetch('/api/auth/register',{ method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({username:u,password:p,nickname:nick}) });
            if(r.status===201){ switchTab('login'); showMsg('✓ 注册成功，请登录','ok'); $('username').value=u; $('password').value=''; }
            else if(r.status===409){ showMsg('用户名已存在','err'); }
            else if(r.status===400){ showMsg('用户名≥3位、密码≥6位','err'); }
            else { showMsg('注册失败('+r.status+')','err'); }
        } else {
            const token=btoa(unescape(encodeURIComponent(u+':'+p)));
            const r=await fetch('/api/auth/me',{ headers:{'Authorization':'Basic '+token} });
            if(r.ok){ sessionStorage.setItem(KEY,token); enterApp(await r.json()); }
            else { showMsg('用户名或密码错误','err'); }
        }
    }catch(e){ showMsg('网络错误：'+e.message,'err'); }
    finally{ $('submitBtn').disabled=false; }
}

// ===== 进入主应用 =====
async function enterApp(me){
    currentMe = me;
    $('auth').style.display = 'none';
    $('app').style.display = 'block';
    $('sbUserName').textContent = me.nickname || me.username;
    const isAdmin = (me.roles||[]).includes('ROLE_ADMIN');
    $('sbUserRole').textContent = isAdmin ? '管理员' : '学生';
    $('adminEntryBtn').style.display = isAdmin ? 'flex' : 'none';
    paintIcons();
    await loadSessions();
    // 有会话则选最近一条，否则新建
    if(allSessions.length > 0){ await selectSession(allSessions[0].id); }
    else { await newSession(); }
    $('msgInput').focus();
}

function logout(){
    sessionStorage.removeItem(KEY); currentMe=null; currentSessionId=null; allSessions=[];
    $('app').style.display='none';
    $('auth').style.display='flex';
    $('log').innerHTML=''; $('sessionList').innerHTML=''; $('password').value='';
}

// ===== 会话列表 =====
async function loadSessions(){
    try{
        const r=await fetch('/api/sessions',{ headers:authHeader() });
        if(r.status===401){ logout(); return; }
        if(r.ok){ allSessions=await r.json(); renderSessionList(allSessions); }
    }catch(e){}
}

function renderSessionList(sessions){
    const today=new Date().toDateString();
    const yesterday=new Date(Date.now()-86400000).toDateString();
    const weekAgo=Date.now()-7*86400000;
    const groups=[
        { label:'今天', items:sessions.filter(s=>new Date(s.updatedAt).toDateString()===today) },
        { label:'昨天', items:sessions.filter(s=>new Date(s.updatedAt).toDateString()===yesterday) },
        { label:'最近7天', items:sessions.filter(s=>{ const d=new Date(s.updatedAt); return d.getTime()>weekAgo&&d.toDateString()!==today&&d.toDateString()!==yesterday; }) },
        { label:'更早', items:sessions.filter(s=>new Date(s.updatedAt).getTime()<=weekAgo) }
    ];
    let html='';
    for(const g of groups){
        if(!g.items.length) continue;
        html+=`<div class="sb-group-label">${g.label}</div>`;
        for(const s of g.items) html+=sessionItemHtml(s);
    }
    $('sessionList').innerHTML = html || '<div class="sb-empty">还没有对话记录</div>';
    paintIcons();
}

function sessionItemHtml(s){
    const active = s.id===currentSessionId ? ' active' : '';
    const timeStr = formatTime(s.updatedAt);
    return `<div class="sb-item${active}" id="si-${s.id}" onclick="selectSession(${s.id})">
        <div class="sb-item-body">
            <div class="sb-title">${esc(s.title)}</div>
            <div class="sb-meta">
                <span>${timeStr} · ${s.messageCount}条</span>
                <span class="sb-del ic" data-i="trash" onclick="event.stopPropagation();deleteSession(${s.id})"></span>
            </div>
        </div>
    </div>`;
}

function formatTime(iso){
    const d=new Date(iso), now=new Date();
    if(d.toDateString()===now.toDateString()) return d.toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'});
    if(new Date(d).setHours(0,0,0,0)===new Date(now-86400000).setHours(0,0,0,0)) return '昨天';
    return d.toLocaleDateString('zh-CN',{month:'numeric',day:'numeric'});
}

// ===== 新建 / 选择 / 删除会话 =====
async function newSession(){
    try{
        const r=await fetch('/api/sessions',{ method:'POST', headers:authHeader() });
        if(!r.ok) return;
        const s=await r.json();
        allSessions.unshift(s);
        currentSessionId=s.id;
        renderSessionList(allSessions);
        $('log').innerHTML='';
        showWelcome();
        $('chatTitle').textContent='新对话';
        $('chatMeta').textContent='';
        $('msgInput').focus();
    }catch(e){}
}

async function selectSession(id){
    currentSessionId=id;
    // 高亮侧栏
    document.querySelectorAll('.sb-item').forEach(el=>el.classList.toggle('active',el.id==='si-'+id));
    const session=allSessions.find(s=>s.id===id);
    $('chatTitle').textContent=session?.title||'对话';
    $('chatMeta').textContent=session?session.messageCount+'条消息':'';
    $('log').innerHTML='';
    try{
        const r=await fetch('/api/sessions/'+id+'/messages',{ headers:authHeader() });
        if(!r.ok) return;
        const messages=await r.json();
        if(!messages.length){ showWelcome(); return; }
        renderHistory(messages);
    }catch(e){}
}

async function deleteSession(id){
    if(!confirm('确定删除这条对话记录？')) return;
    try{
        const r=await fetch('/api/sessions/'+id,{ method:'DELETE', headers:authHeader() });
        if(!r.ok) return;
        allSessions=allSessions.filter(s=>s.id!==id);
        renderSessionList(allSessions);
        if(currentSessionId===id){
            if(allSessions.length>0) await selectSession(allSessions[0].id);
            else await newSession();
        }
    }catch(e){}
}

// ===== 搜索 =====
function handleSearch(q){
    clearTimeout(searchTimer);
    if(!q.trim()){ renderSessionList(allSessions); return; }
    searchTimer=setTimeout(()=>searchSessions(q),400);
}

async function searchSessions(q){
    try{
        const r=await fetch('/api/sessions/search?q='+encodeURIComponent(q),{ headers:authHeader() });
        if(!r.ok) return;
        const results=await r.json();
        renderSearchResults(results, q);
    }catch(e){}
}

function renderSearchResults(results, q){
    if(!results.length){ $('sessionList').innerHTML='<div class="sb-empty">没有找到匹配内容</div>'; return; }
    let html=`<div class="sb-group-label">搜索结果 (${results.length})</div>`;
    for(const r of results){
        const snippet=r.content.length>50?r.content.substring(0,50)+'…':r.content;
        const highlighted=esc(snippet).replace(new RegExp(esc(q),'gi'),m=>`<mark style="background:#fde68a;border-radius:2px">${m}</mark>`);
        html+=`<div class="sb-item" onclick="selectSession(${r.sessionId})">
            <div class="sb-item-body">
                <div class="sb-title" style="font-size:12px">${highlighted}</div>
                <div class="sb-meta"><span>${r.role==='user'?'你说的':'小桥回复'}</span></div>
            </div>
        </div>`;
    }
    $('sessionList').innerHTML=html;
}

// ===== 消息渲染 =====
function showWelcome(){
    $('log').innerHTML=`<div class="welcome"><span class="ic" data-i="bot"></span>你好呀，我是小桥。<br>这里很安全，想聊什么都可以，我会一直认真听。</div>`;
    paintIcons();
}

function renderHistory(messages){
    $('log').innerHTML='';
    let lastDate='';
    for(const m of messages){
        const dateStr=new Date(m.createdAt).toLocaleDateString('zh-CN',{year:'numeric',month:'long',day:'numeric'});
        if(dateStr!==lastDate){ addDateSep(dateStr); lastDate=dateStr; }
        addRow(m.content, m.role==='user'?'me':'ai', false);
    }
    $('log').scrollTop=$('log').scrollHeight;
}

function addDateSep(text){
    const sep=document.createElement('div');
    sep.className='date-sep';
    sep.innerHTML=`<span>${text}</span>`;
    $('log').appendChild(sep);
}

function addRow(text, who, animate=true){
    const row=document.createElement('div');
    row.className='row'+(who==='me'?' me':'');
    if(!animate) row.style.animation='none';
    const mini=document.createElement('div');
    mini.className='mini '+who;
    mini.innerHTML=svgFor(who==='me'?'user':'bot');
    const bubble=document.createElement('div');
    bubble.className='bubble '+who;
    if(who==='ai'){ bubble.classList.add('md'); bubble.dataset.raw=text||''; bubble.innerHTML=renderMarkdown(text||''); }
    else bubble.textContent=text;
    row.appendChild(mini); row.appendChild(bubble);
    $('log').appendChild(row);
    $('log').scrollTop=$('log').scrollHeight;
    return bubble;
}

// ===== 发送消息 =====
async function send(){
    const text=$('msgInput').value.trim();
    if(!text||!currentSessionId) return;
    $('msgInput').value='';
    $('sendBtn').disabled=true;
    // 清除欢迎语
    if($('log').querySelector('.welcome')) $('log').innerHTML='';
    addRow(text,'me');
    const aiBubble=addRow('','ai');
    try{
        const resp=await fetch('/api/chat',{
            method:'POST',
            headers:jsonHeader(),
            body:JSON.stringify({ message:text, sessionId:currentSessionId })
        });
        if(resp.status===401){ logout(); return; }
        if(!resp.ok){ aiBubble.textContent='出错了（'+resp.status+'）'; return; }
        const reader=resp.body.getReader(), decoder=new TextDecoder();
        let buffer='';
        while(true){
            const{done,value}=await reader.read(); if(done) break;
            buffer+=decoder.decode(value,{stream:true});
            const events=buffer.split('\n\n'); buffer=events.pop();
            for(const ev of events){
                const data=ev.split('\n').filter(l=>l.startsWith('data:')).map(l=>l.slice(5)).join('\n');
                if(data){ aiBubble.dataset.raw=(aiBubble.dataset.raw||'')+data; aiBubble.innerHTML=renderMarkdown(aiBubble.dataset.raw); $('log').scrollTop=$('log').scrollHeight; }
            }
        }
        // 回答完成，附上 👍/👎 反馈条
        const aiText=(aiBubble.dataset.raw||'').trim();
        if(aiText){
            addFeedbackBar(text, aiText);
        }
        // 刷新会话列表（标题和计数已由后端更新）
        await loadSessions();
        const updated=allSessions.find(s=>s.id===currentSessionId);
        if(updated){
            $('chatTitle').textContent=updated.title;
            $('chatMeta').textContent=updated.messageCount+'条消息';
        }
    }catch(e){ aiBubble.dataset.raw=(aiBubble.dataset.raw||'')+'\n\n[连接中断: '+e.message+']'; aiBubble.innerHTML=renderMarkdown(aiBubble.dataset.raw); }
    finally{ $('sendBtn').disabled=false; $('msgInput').focus(); }
}

// ===== RAG 反馈（👍/👎）=====
function addFeedbackBar(query, answer){
    const bar=document.createElement('div');
    bar.className='fb-bar';
    bar.innerHTML='<span class="fb-q">这条回答有帮助吗？</span>';
    const up=document.createElement('button'); up.className='fb-btn'; up.textContent='👍'; up.title='有帮助';
    const down=document.createElement('button'); down.className='fb-btn'; down.textContent='👎'; down.title='没帮助';
    up.onclick=()=>submitFeedback(bar,query,answer,'UP');
    down.onclick=()=>submitFeedback(bar,query,answer,'DOWN');
    bar.appendChild(up); bar.appendChild(down);
    $('log').appendChild(bar);
    $('log').scrollTop=$('log').scrollHeight;
}
async function submitFeedback(bar,query,answer,rating){
    let comment='';
    if(rating==='DOWN'){ comment=prompt('谢谢反馈！可以说说哪里不满意吗？（可留空）')||''; }
    try{
        await fetch('/api/feedback',{ method:'POST', headers:jsonHeader(),
            body:JSON.stringify({ sessionId:currentSessionId, query, answer, rating, comment }) });
        bar.innerHTML='<span class="fb-done">✓ 感谢你的反馈</span>';
    }catch(e){ bar.innerHTML='<span class="fb-done">反馈提交失败</span>'; }
}

// ===== 个人信息 =====
function openProfile(){
    $('pfUsername').value=currentMe.username;
    $('pfNickname').value=currentMe.nickname||'';
    $('pfMsg').textContent='';
    $('profileModal').classList.add('show');
    $('pfNickname').focus();
}
function closeProfile(){ $('profileModal').classList.remove('show'); }
async function saveProfile(){
    const nick=$('pfNickname').value.trim();
    if(!nick){ $('pfMsg').textContent='昵称不能为空'; $('pfMsg').className='msg err'; return; }
    $('pfSaveBtn').disabled=true;
    try{
        const r=await fetch('/api/auth/profile',{method:'PUT',headers:jsonHeader(),body:JSON.stringify({nickname:nick})});
        if(r.ok){
            const data=await r.json(); currentMe.nickname=data.nickname;
            $('sbUserName').textContent=data.nickname;
            $('pfMsg').textContent='✓ 已保存'; $('pfMsg').className='msg ok';
            setTimeout(closeProfile,700);
        }else if(r.status===401){ logout(); }
        else{ $('pfMsg').textContent='保存失败('+r.status+')'; $('pfMsg').className='msg err'; }
    }catch(e){ $('pfMsg').textContent='网络错误：'+e.message; $('pfMsg').className='msg err'; }
    finally{ $('pfSaveBtn').disabled=false; }
}

// ===== 键盘事件 =====
$('password').addEventListener('keydown', e=>{ if(e.key==='Enter') submitAuth(); });
$('msgInput').addEventListener('keydown', e=>{ if(e.key==='Enter') send(); });
$('pfNickname').addEventListener('keydown', e=>{ if(e.key==='Enter') saveProfile(); });

// ===== 自动登录 =====
(async function init(){
    if(cred()){
        try{
            const r=await fetch('/api/auth/me',{ headers:authHeader() });
            if(r.ok){ enterApp(await r.json()); return; }
        }catch(e){}
        sessionStorage.removeItem(KEY);
    }
})();
