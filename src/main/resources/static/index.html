<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MindBridge · 小桥</title>
    <style>
        :root{
            --primary:#6366f1; --primary-2:#8b5cf6; --accent:#f472b6;
            --ink:#1e1b3a; --muted:#6b7280; --line:rgba(99,102,241,.14);
            --glass:rgba(255,255,255,.72); --glass-strong:rgba(255,255,255,.86);
        }
        *{ box-sizing:border-box; }
        html,body{ height:100%; }
        body{
            margin:0; font-family:"Segoe UI","Microsoft YaHei",system-ui,-apple-system,sans-serif;
            color:var(--ink); display:flex; flex-direction:column;
            background:#f6f5ff; position:relative; overflow:hidden;
        }
        body::before{
            content:""; position:fixed; inset:-20% -10% auto -10%; height:120%; z-index:0;
            background:
                radial-gradient(40% 50% at 18% 22%, rgba(139,92,246,.28), transparent 60%),
                radial-gradient(38% 48% at 82% 18%, rgba(96,165,250,.26), transparent 60%),
                radial-gradient(45% 55% at 75% 82%, rgba(244,114,182,.20), transparent 60%),
                radial-gradient(40% 50% at 22% 80%, rgba(45,212,191,.20), transparent 60%);
            filter:blur(8px); pointer-events:none;
        }
        #auth,#chat{ position:relative; z-index:1; }
        svg{ width:1em; height:1em; display:block; }

        /* ===== 登录/注册 ===== */
        #auth{ flex:1; display:flex; align-items:center; justify-content:center; padding:24px; }
        .card{
            width:380px; background:var(--glass); backdrop-filter:blur(22px); -webkit-backdrop-filter:blur(22px);
            border:1px solid rgba(255,255,255,.6); border-radius:24px;
            padding:38px 34px; box-shadow:0 20px 60px -20px rgba(80,70,180,.35), 0 4px 12px rgba(80,70,180,.08);
            animation:rise .5s cubic-bezier(.2,.7,.2,1) both;
        }
        @keyframes rise{ from{ opacity:0; transform:translateY(16px) scale(.98);} to{ opacity:1; transform:none;} }
        .logo{
            width:60px; height:60px; margin:0 auto 14px; border-radius:18px;
            background:linear-gradient(135deg,var(--primary),var(--primary-2)); color:#fff;
            display:flex; align-items:center; justify-content:center; font-size:30px;
            box-shadow:0 10px 24px -6px rgba(99,102,241,.6);
        }
        .brand{ text-align:center; font-size:24px; font-weight:600; letter-spacing:-.3px;
            background:linear-gradient(135deg,var(--primary),var(--primary-2)); -webkit-background-clip:text; background-clip:text; color:transparent; }
        .brand-sub{ text-align:center; font-size:13px; color:var(--muted); margin-top:6px; }
        .tabs{ display:flex; gap:6px; margin:24px 0 18px; background:rgba(99,102,241,.07); padding:5px; border-radius:13px; }
        .tab{ flex:1; text-align:center; padding:9px; cursor:pointer; color:var(--muted); font-size:14px; font-weight:500; border-radius:9px; transition:.2s; }
        .tab.active{ background:#fff; color:var(--primary); box-shadow:0 2px 8px rgba(80,70,180,.12); }
        .field{ position:relative; margin-top:14px; }
        .field > .ic{ position:absolute; left:15px; top:50%; transform:translateY(-50%); color:#a5a3c4; font-size:18px; }
        input{
            width:100%; padding:13px 14px 13px 44px; border:1px solid var(--line); border-radius:13px;
            font-size:15px; font-family:inherit; color:var(--ink); background:rgba(255,255,255,.7); transition:.18s;
        }
        input::placeholder{ color:#b3b1cc; }
        input:focus{ outline:none; border-color:var(--primary); background:#fff; box-shadow:0 0 0 4px rgba(99,102,241,.13); }
        input:disabled{ background:rgba(99,102,241,.05); color:var(--muted); }
        .btn{
            width:100%; margin-top:22px; padding:14px; border:none; border-radius:13px; cursor:pointer;
            background:linear-gradient(135deg,var(--primary),var(--primary-2)); color:#fff; font-size:16px; font-weight:600;
            font-family:inherit; box-shadow:0 10px 24px -8px rgba(99,102,241,.7); transition:.18s;
        }
        .btn:hover{ transform:translateY(-1px); box-shadow:0 14px 30px -8px rgba(99,102,241,.8); }
        .btn:active{ transform:translateY(0); }
        .btn:disabled{ background:#c7c5e0; box-shadow:none; cursor:not-allowed; transform:none; }
        .msg{ margin-top:14px; font-size:13px; text-align:center; min-height:18px; }
        .msg.err{ color:#e0496a; } .msg.ok{ color:#0f9d76; }

        /* ===== 聊天 ===== */
        #chat{ flex:1; display:none; flex-direction:column; max-width:820px; width:100%; margin:0 auto; height:100%; padding:14px; }
        .topbar{
            display:flex; align-items:center; justify-content:space-between; padding:12px 18px;
            background:var(--glass-strong); backdrop-filter:blur(18px); -webkit-backdrop-filter:blur(18px);
            border:1px solid rgba(255,255,255,.6); border-radius:18px; box-shadow:0 6px 20px -10px rgba(80,70,180,.25);
        }
        .who{ display:flex; align-items:center; gap:11px; font-size:14px; }
        .avatar{ width:38px; height:38px; border-radius:12px; background:linear-gradient(135deg,var(--primary),var(--primary-2));
            color:#fff; display:flex; align-items:center; justify-content:center; font-size:20px; box-shadow:0 6px 16px -5px rgba(99,102,241,.6); }
        .who .hi{ color:var(--muted); } .who b{ color:var(--ink); font-weight:600; }
        .role-tag{ font-size:11px; background:rgba(139,92,246,.12); color:var(--primary); padding:2px 9px; border-radius:10px; margin-left:7px; font-weight:500; }
        .actions{ display:flex; gap:8px; }
        .icon-btn{ width:38px; height:38px; border:1px solid var(--line); background:rgba(255,255,255,.6); border-radius:11px;
            color:var(--muted); cursor:pointer; font-size:18px; display:flex; align-items:center; justify-content:center; transition:.18s; }
        .icon-btn:hover{ color:var(--primary); border-color:var(--primary); background:#fff; }
        #log{ flex:1; overflow-y:auto; padding:22px 6px; display:flex; flex-direction:column; gap:14px; }
        #log::-webkit-scrollbar{ width:7px; } #log::-webkit-scrollbar-thumb{ background:rgba(99,102,241,.22); border-radius:4px; }
        .row{ display:flex; gap:10px; align-items:flex-end; animation:pop .25s ease both; }
        @keyframes pop{ from{ opacity:0; transform:translateY(8px);} to{ opacity:1; transform:none;} }
        .row.me{ flex-direction:row-reverse; }
        .mini{ width:30px; height:30px; border-radius:9px; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:16px; color:#fff; }
        .mini.ai{ background:linear-gradient(135deg,var(--primary),var(--primary-2)); }
        .mini.me{ background:linear-gradient(135deg,#fb923c,var(--accent)); }
        .bubble{ max-width:74%; padding:12px 16px; border-radius:16px; font-size:15px; line-height:1.65; white-space:pre-wrap; word-break:break-word; }
        .bubble.ai{ background:var(--glass-strong); backdrop-filter:blur(10px); border:1px solid rgba(255,255,255,.6); border-bottom-left-radius:5px; box-shadow:0 4px 16px -8px rgba(80,70,180,.2); }
        .bubble.me{ background:linear-gradient(135deg,var(--primary),var(--primary-2)); color:#fff; border-bottom-right-radius:5px; box-shadow:0 8px 20px -8px rgba(99,102,241,.5); }
        .inputbar{ display:flex; gap:10px; padding:12px; align-items:center;
            background:var(--glass-strong); backdrop-filter:blur(18px); -webkit-backdrop-filter:blur(18px);
            border:1px solid rgba(255,255,255,.6); border-radius:18px; box-shadow:0 6px 20px -10px rgba(80,70,180,.25); }
        .inputbar input{ flex:1; padding-left:18px; border-radius:13px; }
        .send-btn{ width:46px; height:46px; flex-shrink:0; border:none; border-radius:13px; cursor:pointer; font-size:20px;
            background:linear-gradient(135deg,var(--primary),var(--primary-2)); color:#fff; display:flex; align-items:center; justify-content:center;
            box-shadow:0 8px 20px -8px rgba(99,102,241,.7); transition:.18s; }
        .send-btn:hover{ transform:translateY(-1px); } .send-btn:disabled{ background:#c7c5e0; box-shadow:none; cursor:not-allowed; }

        /* ===== 个人信息弹窗 ===== */
        .modal-mask{ position:fixed; inset:0; z-index:10; background:rgba(40,33,90,.32); backdrop-filter:blur(4px);
            display:none; align-items:center; justify-content:center; padding:20px; }
        .modal-mask.show{ display:flex; }
        .modal-card{ width:360px; background:var(--glass-strong); backdrop-filter:blur(24px); -webkit-backdrop-filter:blur(24px);
            border:1px solid rgba(255,255,255,.6); border-radius:22px; padding:28px; box-shadow:0 30px 70px -20px rgba(80,70,180,.5);
            animation:rise .35s cubic-bezier(.2,.7,.2,1) both; }
        .modal-card h3{ margin:0 0 4px; font-size:18px; font-weight:600; display:flex; align-items:center; gap:8px; }
        .modal-card h3 .ic{ color:var(--primary); font-size:20px; }
        .modal-card .tip{ font-size:13px; color:var(--muted); margin:0 0 16px; }
        .modal-actions{ display:flex; gap:10px; justify-content:flex-end; margin-top:20px; }
        .btn-ghost{ padding:10px 18px; border:1px solid var(--line); background:rgba(255,255,255,.6); border-radius:11px; color:var(--muted); cursor:pointer; font-family:inherit; font-size:14px; }
        .btn-ghost:hover{ border-color:var(--primary); color:var(--primary); }
        .btn-sm{ padding:10px 22px; border:none; border-radius:11px; cursor:pointer; font-family:inherit; font-size:14px; font-weight:600;
            background:linear-gradient(135deg,var(--primary),var(--primary-2)); color:#fff; box-shadow:0 8px 18px -8px rgba(99,102,241,.7); }
        .ic{ display:inline-flex; }
    </style>
</head>
<body>
    <!-- 登录 / 注册 -->
    <div id="auth">
        <div class="card">
            <div class="logo"><span class="ic" data-i="heart"></span></div>
            <div class="brand">MindBridge</div>
            <div class="brand-sub">校园心理健康 AI 助手 · 小桥陪你聊聊</div>
            <div class="tabs">
                <div class="tab active" id="tabLogin" onclick="switchTab('login')">登录</div>
                <div class="tab" id="tabRegister" onclick="switchTab('register')">注册</div>
            </div>
            <div class="field"><span class="ic" data-i="user"></span>
                <input id="username" autocomplete="username" placeholder="用户名"/></div>
            <div class="field" id="nickField" style="display:none"><span class="ic" data-i="smile"></span>
                <input id="nickname" maxlength="32" placeholder="昵称（选填，不填默认用用户名）"/></div>
            <div class="field"><span class="ic" data-i="lock"></span>
                <input id="password" type="password" autocomplete="current-password" placeholder="密码"/></div>
            <button class="btn" id="submitBtn" onclick="submitAuth()">登 录</button>
            <div class="msg" id="authMsg"></div>
        </div>
    </div>

    <!-- 聊天 -->
    <div id="chat">
        <div class="topbar">
            <div class="who">
                <div class="avatar"><span class="ic" data-i="bot"></span></div>
                <div><span class="hi">你好，</span><b id="meName">同学</b><span class="role-tag" id="meRole"></span></div>
            </div>
            <div class="actions">
                <button class="icon-btn" id="adminEntry" style="display:none" onclick="location.href='/admin.html'" aria-label="管理后台" title="管理后台"><span class="ic" data-i="shield"></span></button>
                <button class="icon-btn" onclick="openProfile()" aria-label="个人信息" title="个人信息"><span class="ic" data-i="settings"></span></button>
                <button class="icon-btn" onclick="logout()" aria-label="退出登录" title="退出登录"><span class="ic" data-i="logout"></span></button>
            </div>
        </div>
        <div id="log"></div>
        <div class="inputbar">
            <input id="msgInput" placeholder="想聊点什么？小桥在认真听～" autocomplete="off"/>
            <button class="send-btn" id="sendBtn" onclick="send()" aria-label="发送"><span class="ic" data-i="send"></span></button>
        </div>
    </div>

    <!-- 个人信息弹窗 -->
    <div id="profileModal" class="modal-mask">
        <div class="modal-card">
            <h3><span class="ic" data-i="settings"></span>个人信息</h3>
            <p class="tip">修改你的昵称，小桥会用它称呼你</p>
            <div class="field"><span class="ic" data-i="id"></span>
                <input id="pfUsername" disabled/></div>
            <div class="field"><span class="ic" data-i="smile"></span>
                <input id="pfNickname" maxlength="32" placeholder="请输入昵称"/></div>
            <div class="modal-actions">
                <button class="btn-ghost" onclick="closeProfile()">取消</button>
                <button class="btn-sm" id="pfSaveBtn" onclick="saveProfile()">保存</button>
            </div>
            <div class="msg" id="pfMsg"></div>
        </div>
    </div>

    <script>
        // ===== 内联 SVG 图标(零外部依赖) =====
        const ICONS = {
            heart:'<path d="M12 21c-4.5-3-8-6.5-8-10.5A4.2 4.2 0 0 1 12 8a4.2 4.2 0 0 1 8 2.5C20 14.5 16.5 18 12 21z"/>',
            user:'<path d="M6 21v-1a4 4 0 0 1 4-4h4a4 4 0 0 1 4 4v1"/><circle cx="12" cy="8" r="4"/>',
            smile:'<circle cx="12" cy="12" r="9"/><path d="M9 10h.01M15 10h.01M9 14.5a4 4 0 0 0 6 0"/>',
            lock:'<rect x="5" y="11" width="14" height="9" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/>',
            bot:'<rect x="4" y="8" width="16" height="12" rx="3"/><path d="M12 8V4M8 4h8"/><circle cx="9.5" cy="14" r="1.1"/><circle cx="14.5" cy="14" r="1.1"/>',
            settings:'<circle cx="12" cy="12" r="3"/><path d="M12 3v2.5M12 18.5V21M3 12h2.5M18.5 12H21M5.6 5.6l1.8 1.8M16.6 16.6l1.8 1.8M18.4 5.6l-1.8 1.8M7.4 16.6l-1.8 1.8"/>',
            logout:'<path d="M14 8V6a2 2 0 0 0-2-2H6a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h6a2 2 0 0 0 2-2v-2"/><path d="M10 12h11M18 9l3 3-3 3"/>',
            send:'<path d="M22 2 11 13"/><path d="M22 2 15 22l-4-9-9-4 20-7z"/>',
            id:'<rect x="3" y="5" width="18" height="14" rx="2"/><circle cx="8.5" cy="11" r="2"/><path d="M5 16c.5-1.3 1.9-2 3.5-2s3 .7 3.5 2M14 10h4M14 14h4"/>',
            shield:'<path d="M12 3l8 3v6c0 4.5-3.2 7.8-8 9-4.8-1.2-8-4.5-8-9V6z"/>'
        };
        function svgFor(name){
            return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">'+(ICONS[name]||'')+'</svg>';
        }
        function paintIcons(root){
            (root||document).querySelectorAll('.ic[data-i]').forEach(el=>{
                if(!el.dataset.done){ el.innerHTML = svgFor(el.dataset.i); el.dataset.done='1'; }
            });
        }
        paintIcons();

        // ===== 应用逻辑 =====
        let mode = 'login';
        let currentMe = null;
        const KEY = 'mb_cred';

        function $(id){ return document.getElementById(id); }
        function cred(){ return sessionStorage.getItem(KEY); }
        function authHeader(){ return { 'Authorization': 'Basic ' + cred() }; }

        function switchTab(m){
            mode = m;
            $('tabLogin').classList.toggle('active', m==='login');
            $('tabRegister').classList.toggle('active', m==='register');
            $('submitBtn').textContent = m==='login' ? '登 录' : '注 册';
            $('nickField').style.display = m==='register' ? 'block' : 'none';
            $('password').setAttribute('autocomplete', m==='login' ? 'current-password' : 'new-password');
            $('authMsg').textContent = '';
        }

        function showMsg(text, type){
            const el = $('authMsg');
            el.textContent = text;
            el.className = 'msg ' + (type || '');
        }

        async function submitAuth(){
            const u = $('username').value.trim();
            const p = $('password').value;
            if(!u || !p){ showMsg('请输入用户名和密码', 'err'); return; }
            $('submitBtn').disabled = true;
            try {
                if(mode === 'register'){
                    const nick = $('nickname').value.trim();
                    const r = await fetch('/api/auth/register', {
                        method:'POST', headers:{'Content-Type':'application/json'},
                        body: JSON.stringify({ username:u, password:p, nickname:nick })
                    });
                    if(r.status === 201){
                        switchTab('login');
                        showMsg('✓ 注册成功！已填好用户名，请输入密码登录', 'ok');
                        $('username').value = u; $('password').value = ''; $('password').focus();
                    } else if(r.status === 409){ showMsg('该用户名已被注册，请换一个', 'err'); }
                    else if(r.status === 400){ showMsg('用户名至少3位、密码至少6位', 'err'); }
                    else { showMsg('注册失败('+r.status+')', 'err'); }
                } else {
                    const token = btoa(unescape(encodeURIComponent(u + ':' + p)));
                    const r = await fetch('/api/auth/me', { headers:{ 'Authorization':'Basic '+token } });
                    if(r.ok){ sessionStorage.setItem(KEY, token); enterChat(await r.json()); }
                    else { showMsg('用户名或密码错误', 'err'); }
                }
            } catch(e){ showMsg('网络错误：' + e.message, 'err'); }
            finally { $('submitBtn').disabled = false; }
        }

        function enterChat(me){
            currentMe = me;
            $('auth').style.display = 'none';
            $('chat').style.display = 'flex';
            $('meName').textContent = me.nickname || me.username;
            const isAdmin = (me.roles || []).includes('ROLE_ADMIN');
            $('meRole').textContent = isAdmin ? '管理员' : '学生';
            $('adminEntry').style.display = isAdmin ? 'flex' : 'none';
            if($('log').children.length === 0){
                addRow('你好呀，我是小桥。这里很安全，想聊什么都可以，我会一直认真听。', 'ai');
            }
            $('msgInput').focus();
        }

        function logout(){
            sessionStorage.removeItem(KEY); currentMe = null;
            $('log').innerHTML = '';
            $('chat').style.display = 'none';
            $('auth').style.display = 'flex';
            $('password').value = '';
        }

        function openProfile(){
            $('pfUsername').value = currentMe.username;
            $('pfNickname').value = currentMe.nickname || '';
            $('pfMsg').textContent = '';
            $('profileModal').classList.add('show');
            $('pfNickname').focus();
        }
        function closeProfile(){ $('profileModal').classList.remove('show'); }

        async function saveProfile(){
            const nick = $('pfNickname').value.trim();
            if(!nick){ $('pfMsg').textContent='昵称不能为空'; $('pfMsg').className='msg err'; return; }
            $('pfSaveBtn').disabled = true;
            try {
                const r = await fetch('/api/auth/profile', {
                    method:'PUT',
                    headers: Object.assign({'Content-Type':'application/json'}, authHeader()),
                    body: JSON.stringify({ nickname: nick })
                });
                if(r.ok){
                    const data = await r.json();
                    currentMe.nickname = data.nickname;
                    $('meName').textContent = data.nickname;
                    $('pfMsg').textContent = '✓ 已保存'; $('pfMsg').className = 'msg ok';
                    setTimeout(closeProfile, 700);
                } else if(r.status === 401){ logout(); }
                else { $('pfMsg').textContent = '保存失败('+r.status+')'; $('pfMsg').className='msg err'; }
            } catch(e){ $('pfMsg').textContent = '网络错误：'+e.message; $('pfMsg').className='msg err'; }
            finally { $('pfSaveBtn').disabled = false; }
        }

        function addRow(text, who){
            const row = document.createElement('div');
            row.className = 'row ' + (who==='me' ? 'me' : '');
            const mini = document.createElement('div');
            mini.className = 'mini ' + who;
            mini.innerHTML = svgFor(who==='me' ? 'user' : 'bot');
            const bubble = document.createElement('div');
            bubble.className = 'bubble ' + who;
            bubble.textContent = text;
            row.appendChild(mini); row.appendChild(bubble);
            $('log').appendChild(row);
            $('log').scrollTop = $('log').scrollHeight;
            return bubble;
        }

        async function send(){
            const text = $('msgInput').value.trim();
            if(!text) return;
            $('msgInput').value = '';
            $('sendBtn').disabled = true;
            addRow(text, 'me');
            const aiBubble = addRow('', 'ai');
            try {
                const resp = await fetch('/api/chat/stream?message=' + encodeURIComponent(text), { headers: authHeader() });
                if(resp.status === 401){ logout(); return; }
                if(!resp.ok){ aiBubble.textContent = '出错了（'+resp.status+'）'; return; }
                const reader = resp.body.getReader();
                const decoder = new TextDecoder();
                let buffer = '';
                while(true){
                    const { done, value } = await reader.read();
                    if(done) break;
                    buffer += decoder.decode(value, { stream:true });
                    const events = buffer.split('\n\n');
                    buffer = events.pop();
                    for(const ev of events){
                        const data = ev.split('\n').filter(l => l.startsWith('data:')).map(l => l.slice(5)).join('\n');
                        if(data){ aiBubble.textContent += data; $('log').scrollTop = $('log').scrollHeight; }
                    }
                }
            } catch(e){ aiBubble.textContent += '\n[连接中断: ' + e.message + ']'; }
            finally { $('sendBtn').disabled = false; $('msgInput').focus(); }
        }

        $('password').addEventListener('keydown', e => { if(e.key==='Enter') submitAuth(); });
        $('msgInput').addEventListener('keydown', e => { if(e.key==='Enter') send(); });
        $('pfNickname').addEventListener('keydown', e => { if(e.key==='Enter') saveProfile(); });

        (async function init(){
            if(cred()){
                try {
                    const r = await fetch('/api/auth/me', { headers: authHeader() });
                    if(r.ok){ enterChat(await r.json()); return; }
                } catch(e){}
                sessionStorage.removeItem(KEY);
            }
        })();
    </script>
</body>
</html>
