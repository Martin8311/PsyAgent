server:
  port: 8080

spring:
  application:
    name: mindbridge

  # ===== MySQL (用户信息持久化) =====
  datasource:
    url: jdbc:mysql://localhost:3306/mindbridge?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai&characterEncoding=utf8
    username: ${MYSQL_USERNAME:root}
    # 密码走环境变量 MYSQL_PASSWORD，不写入代码库
    password: ${MYSQL_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update          # 自动建表/更新表结构
    open-in-view: false         # WebFlux 下关闭 OSIV
    show-sql: false
    properties:
      hibernate.format_sql: true

  # ===== Redis (会话记录/短期记忆) =====
  data:
    redis:
      host: localhost
      port: 6379
      # 密码走环境变量 REDIS_PASSWORD，不写入代码库
      password: ${REDIS_PASSWORD}

# ===== MindBridge 自定义配置 =====
mindbridge:
  ai:
    provider: ollama
    ollama:
      base-url: http://localhost:11434
      model: qwen2.5:3b
      timeout-seconds: 120
  memory:
    # 短期记忆保留的最大消息条数(user+assistant 合计)
    max-messages: 20
    # 会话记录在 Redis 中的过期天数
    ttl-days: 7

logging:
  level:
    com.mindbridge: DEBUG
