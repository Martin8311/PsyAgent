server:
  port: 8080

spring:
  application:
    name: mindbridge

  # ===== MySQL (用户信息持久化) =====
  datasource:
    url: jdbc:mysql://localhost:3306/mindbridge?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai&characterEncoding=utf8
    username: ${MYSQL_USERNAME:root}
    # 密码走环境变量 MYSQL_PASSWORD，不写入代码库
    password: ${MYSQL_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update          # 自动建表/更新表结构
    open-in-view: false         # WebFlux 下关闭 OSIV
    show-sql: false
    properties:
      hibernate.format_sql: true

  # ===== Redis (会话记录/短期记忆) =====
  data:
    redis:
      host: localhost
      port: 6379
      # 密码走环境变量 REDIS_PASSWORD，不写入代码库
      password: ${REDIS_PASSWORD}

  # ===== RabbitMQ (异步任务: 写Excel台账 / 发预警邮件) =====
  rabbitmq:
    host: localhost
    port: 5672
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    # 独立 vhost, 与同实例其他应用隔离
    virtual-host: mindbridge
    listener:
      simple:
        # 消费失败不重新入队; 重试耗尽后转入死信队列(DLQ)
        default-requeue-rejected: false
        retry:
          enabled: true
          max-attempts: 3
          initial-interval: 2000ms

  # ===== 邮件 (QQ SMTP, 高危预警) =====
  mail:
    host: smtp.qq.com
    port: 465
    # 缺省留空, 保证未配邮箱也能启动(发邮件时才需要真实值)
    username: ${MAIL_USERNAME:}
    # 授权码走环境变量, 不写入代码库
    password: ${MAIL_PASSWORD:}
    properties:
      mail.smtp.ssl.enable: true
      mail.smtp.auth: true

  # ===== Spring AI (RAG: Ollama embedding + Chroma 向量库) =====
  ai:
    # 聊天仍由我们手写的 OllamaAiClient 负责；这里只启用 embedding，关掉 Spring AI 的 chat 自动配置
    model:
      chat: none
      embedding: ollama
    # MCP Server: 暴露写台账/发邮件/查预警为标准 MCP 工具 (SSE 端点 /sse)
    mcp:
      server:
        name: mindbridge-tools
        version: 1.0.0
    ollama:
      base-url: http://localhost:11434
      embedding:
        options:
          model: bge-m3          # 中文向量模型，需 ollama pull bge-m3
    vectorstore:
      chroma:
        initialize-schema: true  # 启动时自动创建 collection（需 Chroma 服务已就绪）
        collection-name: mindbridge_kb
        # client.host/port 默认 http://localhost:8000，与 docker 一致，无需显式配置

# ===== MindBridge 自定义配置 =====
mindbridge:
  ai:
    provider: ollama
    ollama:
      base-url: http://localhost:11434
      model: qwen2.5:3b
      timeout-seconds: 120
  memory:
    # 短期记忆保留的最大消息条数(user+assistant 合计)
    max-messages: 20
    # 会话记录在 Redis 中的过期天数
    ttl-days: 7
  knowledge:
    # RAG 检索返回的片段数
    top-k: 3
    # 相似度阈值：低于此分数的片段视为不相关，不注入回答
    min-score: 0.3
    # 文本切块：每块约 400 字，相邻块重叠 80 字以保留上下文
    chunk-size: 400
    chunk-overlap: 80
  # ===== 异步对话台账 (按 用户+会话 分文件) =====
  excel:
    dir: ./data/chat-logs
  # ===== 高危预警邮件收件人 (管理员/心理老师, 逗号分隔) =====
  mail:
    admin-recipients: ${ADMIN_MAIL:}

logging:
  level:
    com.mindbridge: INFO
